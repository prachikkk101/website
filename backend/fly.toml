# fly.toml app configuration file generated for oxygen-protech-gas on 2026-07-01T13:10:05+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'oxygen-protech-gas'
primary_region = 'sin'

[build]

[deploy]
  # WARNING: NEVER change this to 'prisma migrate reset', 'prisma db push --force-reset',
  # 'prisma db seed', or ANY command with "reset", "force", or "seed" in it.
  # Those commands WILL permanently destroy ALL production data in the Neon database.
  # The ONLY safe automated deploy command is 'prisma migrate deploy'.
  # Using node_modules/.bin/prisma (not npx) to avoid startup timeout on Fly's release_command.
  release_command = 'sh -c "node_modules/.bin/prisma migrate deploy; true"'


[http_service]
internal_port = 5001
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
cpus = 1
memory_mb = 256
